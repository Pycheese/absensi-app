[phases.setup]
aptPkgs = ["libpng-dev", "libjpeg-dev", "libfreetype6-dev"]

[phases.install]
cmds = [
    "install-php-extensions gd",
    "composer install --optimize-autoloader --no-scripts --no-interaction",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache && chmod -R a+rw storage bootstrap/cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"